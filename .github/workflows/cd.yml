name: Build and Push Docker Image

permissions:
  contents: read  
  packages: write 
  actions: read  
  attestations: write
  id-token: write

on:
  push:
    branches:
      - deploy-main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from version.json
        id: get_version
        run: |
          VERSION=v$(jq -r .version version.json)-amd64
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
      # Debugging: Print out the VERSION to verify it's correct
      - name: Verify version
        run: |
          echo "The extracted version is: ${{ env.VERSION }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare CI Dockerfile
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path("Dockerfile").read_text()

          source = source.replace(
              "FROM --platform=linux/amd64 ubuntu:22.04 AS base",
              "ARG TARGETPLATFORM\nFROM --platform=$TARGETPLATFORM ubuntu:22.04 AS base",
              1,
          )

          source = source.replace(
              "RUN wget -q http://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-stable/google-chrome-stable_134.0.6998.88-1_amd64.deb\nRUN apt-get install -y ./google-chrome-stable_134.0.6998.88-1_amd64.deb",
              "RUN wget -q https://storage.googleapis.com/chrome-for-testing-public/134.0.6998.88/linux64/chrome-linux64.zip \\\n    && unzip chrome-linux64.zip \\\n    && mv chrome-linux64 /opt/chrome-linux64 \\\n    && ln -sf /opt/chrome-linux64/chrome /usr/local/bin/google-chrome \\\n    && ln -sf /opt/chrome-linux64/chrome /usr/local/bin/google-chrome-stable \\\n    && rm -rf chrome-linux64.zip",
              1,
          )

          Path("Dockerfile.ci").write_text(source)
          PY

      - name: Build Docker image
        run: |
          docker build --no-cache --platform linux/amd64 -t attendee:latest -f ./Dockerfile.ci .

      - name: Tag Docker image
        run: |
          docker tag attendee:latest ghcr.io/fuseainl/attendee:${{ env.VERSION }}
          docker tag attendee:latest ghcr.io/fuseainl/attendee:latest

      - name: Push Docker image
        run: |
          docker push ghcr.io/fuseainl/attendee:${{ env.VERSION }}
          docker push ghcr.io/fuseainl/attendee:latest
